<title>AI 트렌드 리포트 아카이브</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #171a21;
    --accent: #7c9cff;
    --text: #e8ecf4;
    --muted: #9aa4b2;
    --border: #272d38;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 28px 80px;
  }
  h1 {
    font-size: 26px;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  .sub {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 28px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 26px;
  }
  ul { list-style: none; margin: 0; padding: 0; }
  li {
    padding: 10px 0;
    border-bottom: 1px dashed var(--border);
  }
  li:last-child { border-bottom: none; }
  a {
    color: var(--accent);
    text-decoration: none;
    font-size: 15px;
  }
  a:hover { text-decoration: underline; }
  .home {
    display: inline-block;
    margin-top: 24px;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>

</html>
